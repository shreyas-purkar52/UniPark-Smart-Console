
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniPark Security Console</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2cc0d",
                        "background-dark": "#0a0a0a",
                        "panel-dark": "#141414",
                        "border-dark": "#2a2a2a",
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                    },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #f8f8f8;
            margin: 0;
            overflow: hidden;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #f2cc0d33;
            border-radius: 10px;
        }
        .slot-pulse {
            box-shadow: 0 0 0 0 rgba(242, 204, 13, 0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(242, 204, 13, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(242, 204, 13, 0); }
            100% { box-shadow: 0 0 0 0 rgba(242, 204, 13, 0); }
        }
        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(180px); }
        }

        /* =====================
           LIGHT MODE OVERRIDES
           ===================== */
        html.light-mode body {
            background-color: #f0f4f8;
            color: #1a202c;
        }
        html.light-mode .bg-\[\#050505\],
        html.light-mode .bg-\[\#0a0a0a\]  { background-color: #f0f4f8 !important; }
        html.light-mode .bg-\[\#0b0c10\]  { background-color: #e8edf5 !important; }
        html.light-mode .bg-\[\#0e0e0e\]  { background-color: #f8fafc !important; }
        html.light-mode .bg-\[\#0f0f0f\]  { background-color: #f1f5f9 !important; }
        html.light-mode .bg-\[\#111\]     { background-color: #ffffff !important; }
        html.light-mode .bg-\[\#141414\]  { background-color: #f8fafc !important; }
        html.light-mode .bg-\[\#151515\]  { background-color: #f1f5f9 !important; }
        html.light-mode .bg-\[\#1a1a1a\]  { background-color: #e2e8f0 !important; }
        html.light-mode .bg-black         { background-color: #f1f5f9 !important; }
        html.light-mode .bg-black\/40     { background-color: rgba(241,245,249,0.8) !important; }
        html.light-mode .bg-black\/50     { background-color: rgba(241,245,249,0.9) !important; }
        html.light-mode .bg-black\/80     { background-color: rgba(15,23,42,0.85) !important; }
        html.light-mode .bg-black\/90     { background-color: rgba(15,23,42,0.9) !important; }
        html.light-mode .bg-white\/5      { background-color: rgba(0,0,0,0.04) !important; }
        html.light-mode .bg-white\/10     { background-color: rgba(0,0,0,0.07) !important; }

        /* Text */
        html.light-mode .text-white        { color: #1e293b !important; }
        html.light-mode .text-slate-300    { color: #475569 !important; }
        html.light-mode .text-slate-400    { color: #64748b !important; }
        html.light-mode .text-slate-500    { color: #475569 !important; }
        html.light-mode .text-slate-600    { color: #374151 !important; }
        html.light-mode .text-slate-700    { color: #6b7280 !important; }

        /* Borders */
        html.light-mode .border-white\/5   { border-color: rgba(0,0,0,0.08) !important; }
        html.light-mode .border-white\/10  { border-color: rgba(0,0,0,0.1) !important; }
        html.light-mode .border-white\/20  { border-color: rgba(0,0,0,0.15) !important; }

        /* Slot colours - available slots in light mode */
        html.light-mode .bg-\[\#0a0a0a\].border-white\/5 { border-color: rgba(0,0,0,0.1) !important; }

        /* Sidebar background */
        html.light-mode aside { background-color: #ffffff !important; border-color: rgba(0,0,0,0.08) !important; }

        /* Scrollbar in light mode */
        html.light-mode .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); }
        html.light-mode .custom-scrollbar::-webkit-scrollbar-thumb { background: #f2cc0d66; }
    </style>
</head>
<body class="dark">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
